services:
  proxy-checker:
    build: .
    container_name: proxy-checker
    restart: unless-stopped
    ports:
      - "8060:8060"
    environment:
      PORT: "8060"
      AUTH_PASSWORD: "linux.do"
      AUTH_SESSION_SECRET: "change-this-secret"
      APP_TIMEZONE: "Asia/Shanghai"
    volumes:
      - ./repo_data:/app/repo_data
      - ./checked_data:/app/checked_data
      - ./auto_data:/app/auto_data
      - ./run_logs:/app/run_logs
      - ./server.log:/app/server.log